<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e9dfd1" />
    <meta
      name="description"
      content="Stivalita Italy - бренд итальянских аксессуаров из натуральной кожи."
    />
    <title>Stivalita Italy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Stivalita links">
      <section class="profile" aria-labelledby="brand-title">
        <div class="brand">
          <h1 id="brand-title" class="brand__name">
            Stival<span class="brand__flag" aria-hidden="true"></span>ita
          </h1>
          <p class="brand__country">Italy</p>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <p class="tagline">Бренд итальянских аксессуаров<br />из натуральной кожи</p>

        <nav class="links" aria-label="Основные ссылки">
          <a class="link-card" href="https://www.instagram.com/stivalita/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <rect x="3" y="3" width="18" height="18" rx="5" />
                <circle cx="12" cy="12" r="4" />
                <circle cx="17.5" cy="6.5" r="1" />
              </svg>
            </span>
            <span class="link-card__label">Instagram</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>

          <a class="link-card" href="https://www.wildberries.ru/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__icon link-card__icon--wb" aria-hidden="true">WB</span>
            <span class="link-card__label">Wildberries</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>

          <a class="link-card" href="https://www.ozon.ru/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__icon link-card__icon--ozon" aria-hidden="true">ozon</span>
            <span class="link-card__label">Ozon</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>
        </nav>

        <a class="email" href="mailto:Stivalita@mail.ru">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="m4 7 8 6 8-6" />
          </svg>
          <span>Stivalita@mail.ru</span>
        </a>
      </section>
    </main>
  </body>
</html>
