<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e9dfd1" />
    <meta
      name="description"
      content="Stivalita Italy - бренд итальянских аксессуаров из натуральной кожи."
    />
    <title>Stivalita Italy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Stivalita links">
      <section class="profile" aria-labelledby="brand-title">
        <div class="brand">
          <h1 id="brand-title" class="brand__title">
            <img class="brand__logo" src="assets/logo.png" alt="Stivalita" />
          </h1>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <p class="tagline">бренд итальянских аксессуаров<br />из натуральной кожи</p>

        <nav class="links" aria-label="Основные ссылки">
          <a class="link-card" href="https://www.instagram.com/stivalita/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__label">Instagram</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>

          <a class="link-card" href="https://www.wildberries.ru/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__label">Wildberries</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>

          <a class="link-card" href="https://www.ozon.ru/" target="_blank" rel="noopener noreferrer">
            <span class="link-card__label">Ozon</span>
            <span class="link-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M4 12h15" />
                <path d="m13 5 7 7-7 7" />
              </svg>
            </span>
          </a>
        </nav>

        <button class="email" type="button" data-email="stivalita@mail.ru" data-tooltip="скопировать">
          <span>stivalita@mail.ru</span>
        </button>
      </section>
    </main>
    <script>
      const emailButton = document.querySelector(".email");

      emailButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(emailButton.dataset.email);
        emailButton.dataset.tooltip = "скопировано";
        window.setTimeout(() => {
          emailButton.dataset.tooltip = "скопировать";
        }, 1200);
      });
    </script>
  </body>
</html>
